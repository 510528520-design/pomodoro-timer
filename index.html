<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>消消乐 Match-3 Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 40px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .scores-container {
            display: flex;
            gap: 10px;
        }

        .score-box {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 8px 15px;
            border-radius: 10px;
            text-align: center;
            min-width: 80px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .score-label {
            font-size: 11px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.8);
            font-weight: bold;
        }

        .score-value {
            font-size: 24px;
            font-weight: bold;
            color: white;
        }

        .above-game {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .game-intro {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
        }

        .restart-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        .restart-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .game-container {
            position: relative;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
        }

        .grid-cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }

        .tile-container {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
        }

        .tile {
            position: absolute;
            width: calc(12.5% - 7px);
            aspect-ratio: 1;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            transition: all 0.2s ease;
            cursor: pointer;
            z-index: 10;
            font-size: 24px;
        }

        .tile:hover {
            transform: scale(1.05);
            z-index: 20;
        }

        .tile.selected {
            animation: pulse 0.5s ease infinite;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .tile-red { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%); color: white; }
        .tile-blue { background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%); color: white; }
        .tile-green { background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%); color: white; }
        .tile-yellow { background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%); color: white; }
        .tile-purple { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); color: white; }
        .tile-orange { background: linear-gradient(135deg, #ff9966 0%, #ff5e62 100%); color: white; }
        .tile-bomb { background: linear-gradient(135deg, #2c3e50 0%, #4a4a4a 100%); color: white; }
        .tile-rainbow { 
            background: linear-gradient(135deg, #ff6b6b 0%, #f7971e 25%, #ffd200 50%, #56ab2f 75%, #4ecdc4 100%); 
            color: white;
            animation: rainbow 2s linear infinite;
        }

        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .tile-new {
            animation: drop 0.3s ease;
        }

        @keyframes drop {
            0% { opacity: 0; transform: translateY(-50px) scale(0); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .tile-match {
            animation: explode 0.3s ease forwards;
        }

        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); }
            100% { transform: scale(0); opacity: 0; }
        }

        .tile-swapping {
            transition: all 0.15s ease;
        }

        .game-message {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            animation: fadeIn 0.3s ease;
        }

        .game-message.show {
            display: flex;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .message-title {
            font-size: 40px;
            font-weight: bold;
            color: white;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .message-score {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 20px;
        }

        .message-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .message-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .how-to-play {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            line-height: 1.6;
            text-align: center;
        }

        .how-to-play strong {
            color: white;
        }

        .timer-container {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }

        .timer {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 10px 30px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 24px;
            font-weight: bold;
            color: white;
        }

        .timer.warning {
            animation: timerWarning 0.5s ease infinite;
            background: rgba(255, 107, 107, 0.4);
        }

        @keyframes timerWarning {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .combo-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 200;
        }

        .combo-text {
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            animation: comboPopup 0.8s ease forwards;
        }

        @keyframes comboPopup {
            0% { transform: scale(0); opacity: 0; }
            30% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

        @media (max-width: 500px) {
            .title {
                font-size: 28px;
            }

            .game-container {
                padding: 10px;
            }

            .grid-container {
                gap: 6px;
            }

            .tile-container {
                top: 10px;
                left: 10px;
                right: 10px;
                bottom: 10px;
            }

            .tile {
                width: calc(12.5% - 5.25px);
                font-size: 18px;
                border-radius: 8px;
            }

            .message-title {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">🌟 消消乐</div>
            <div class="scores-container">
                <div class="score-box">
                    <div class="score-label">分数</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">最高分</div>
                    <div class="score-value" id="best">0</div>
                </div>
            </div>
        </div>

        <div class="timer-container">
            <div class="timer" id="timer">60</div>
        </div>

        <div class="above-game">
            <div class="game-intro">
                交换相邻方块，消除3个或更多相同颜色！
            </div>
            <button class="restart-btn" onclick="restartGame()">重新开始</button>
        </div>

        <div class="game-container">
            <div class="grid-container" id="gridContainer"></div>
            <div class="tile-container" id="tileContainer"></div>
        </div>

        <div class="how-to-play">
            <strong>游戏说明：</strong>点击两个相邻的方块进行交换，当3个或更多相同颜色连成一线时会消除并获得分数！
        </div>
    </div>

    <div class="combo-container" id="comboContainer"></div>

    <div class="game-message" id="gameMessage">
        <div class="message-content">
            <div class="message-title" id="messageTitle">游戏结束！</div>
            <div class="message-score" id="messageScore">得分: 0</div>
            <button class="message-btn" onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <script>
        const GRID_SIZE = 8;
        const GEM_TYPES = ['red', 'blue', 'green', 'yellow', 'purple', 'orange'];
        const GEM_ICONS = ['🔴', '🔵', '🟢', '🟡', '🟣', '🟠'];
        const GAME_TIME = 60;

        let grid = [];
        let score = 0;
        let bestScore = localStorage.getItem('bestMatch3') || 0;
        let gameOver = false;
        let selectedTile = null;
        let timerInterval = null;
        let timeLeft = GAME_TIME;
        let isAnimating = false;
        let combo = 0;

        function init() {
            grid = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(null));
            score = 0;
            gameOver = false;
            selectedTile = null;
            timeLeft = GAME_TIME;
            combo = 0;
            isAnimating = false;

            document.getElementById('best').textContent = bestScore;
            document.getElementById('score').textContent = score;
            document.getElementById('timer').textContent = timeLeft;
            document.getElementById('timer').classList.remove('warning');
            document.getElementById('gameMessage').classList.remove('show');

            // 初始化网格，确保没有初始匹配
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    let type;
                    do {
                        type = Math.floor(Math.random() * GEM_TYPES.length);
                    } while (wouldCreateMatch(r, c, type));
                    grid[r][c] = type;
                }
            }

            createGridCells();
            render();
            startTimer();
        }

        function wouldCreateMatch(row, col, type) {
            // 检查水平
            let horizontalCount = 1;
            let c = col - 1;
            while (c >= 0 && grid[row][c] === type) {
                horizontalCount++;
                c--;
            }
            c = col + 1;
            while (c < GRID_SIZE && grid[row][c] === type) {
                horizontalCount++;
                c++;
            }
            if (horizontalCount >= 3) return true;

            // 检查垂直
            let verticalCount = 1;
            let r = row - 1;
            while (r >= 0 && grid[r][col] === type) {
                verticalCount++;
                r--;
            }
            r = row + 1;
            while (r < GRID_SIZE && grid[r][col] === type) {
                verticalCount++;
                r++;
            }
            if (verticalCount >= 3) return true;

            return false;
        }

        function createGridCells() {
            const container = document.getElementById('gridContainer');
            container.innerHTML = '';
            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                container.appendChild(cell);
            }
        }

        function render(matchedTiles = [], newTiles = []) {
            const container = document.getElementById('tileContainer');
            container.innerHTML = '';

            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (grid[r][c] !== null) {
                        const tile = document.createElement('div');
                        const type = grid[r][c];
                        tile.className = `tile tile-${GEM_TYPES[type]}`;
                        
                        if (newTiles.some(t => t.r === r && t.c === c)) {
                            tile.classList.add('tile-new');
                        }
                        if (matchedTiles.some(t => t.r === r && t.c === c)) {
                            tile.classList.add('tile-match');
                        }
                        if (selectedTile && selectedTile.r === r && selectedTile.c === c) {
                            tile.classList.add('selected');
                        }

                        const gap = window.innerWidth <= 500 ? 6 : 8;
                        const cellSize = (100 - gap * (GRID_SIZE - 1)) / GRID_SIZE;
                        const x = c * (cellSize + gap);
                        const y = r * (cellSize + gap);
                        tile.style.left = `${x}%`;
                        tile.style.top = `${y}%`;
                        tile.textContent = GEM_ICONS[type];
                        tile.dataset.row = r;
                        tile.dataset.col = c;
                        tile.addEventListener('click', () => handleTileClick(r, c));
                        container.appendChild(tile);
                    }
                }
            }
        }

        function handleTileClick(row, col) {
            if (gameOver || isAnimating) return;

            if (selectedTile === null) {
                selectedTile = { r: row, c: col };
                render();
            } else {
                const dr = Math.abs(selectedTile.r - row);
                const dc = Math.abs(selectedTile.c - col);
                if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
                    // 相邻，尝试交换
                    trySwap(selectedTile.r, selectedTile.c, row, col);
                }
                selectedTile = null;
                render();
            }
        }

        async function trySwap(r1, c1, r2, c2) {
            isAnimating = true;
            
            // 交换
            [grid[r1][c1], grid[r2][c2]] = [grid[r2][c2], grid[r1][c1]];
            render();

            // 检查是否有匹配
            const matches = findMatches();
            if (matches.length > 0) {
                combo = 0;
                await processMatches();
            } else {
                // 无效交换，换回来
                await sleep(150);
                [grid[r1][c1], grid[r2][c2]] = [grid[r2][c2], grid[r1][c1]];
                render();
            }

            isAnimating = false;
        }

        function findMatches() {
            const matches = new Set();

            // 检查水平
            for (let r = 0; r < GRID_SIZE; r++) {
                let count = 1;
                for (let c = 1; c < GRID_SIZE; c++) {
                    if (grid[r][c] !== null && grid[r][c] === grid[r][c - 1]) {
                        count++;
                    } else {
                        if (count >= 3) {
                            for (let i = 0; i < count; i++) {
                                matches.add(`${r},${c - 1 - i}`);
                            }
                        }
                        count = 1;
                    }
                }
                if (count >= 3) {
                    for (let i = 0; i < count; i++) {
                        matches.add(`${r},${GRID_SIZE - 1 - i}`);
                    }
                }
            }

            // 检查垂直
            for (let c = 0; c < GRID_SIZE; c++) {
                let count = 1;
                for (let r = 1; r < GRID_SIZE; r++) {
                    if (grid[r][c] !== null && grid[r][c] === grid[r - 1][c]) {
                        count++;
                    } else {
                        if (count >= 3) {
                            for (let i = 0; i < count; i++) {
                                matches.add(`${r - 1 - i},${c}`);
                            }
                        }
                        count = 1;
                    }
                }
                if (count >= 3) {
                    for (let i = 0; i < count; i++) {
                        matches.add(`${GRID_SIZE - 1 - i},${c}`);
                    }
                }
            }

            return Array.from(matches).map(m => {
                const [r, c] = m.split(',').map(Number);
                return { r, c };
            });
        }

        async function processMatches() {
            let matches = findMatches();
            
            while (matches.length > 0) {
                combo++;
                
                // 显示消除动画
                render(matches);
                
                // 加分
                const points = matches.length * 10 * combo;
                score += points;
                document.getElementById('score').textContent = score;

                // 显示连击
                if (combo > 1) {
                    showCombo(combo);
                }

                await sleep(300);

                // 移除匹配的方块
                matches.forEach(m => {
                    grid[m.r][m.c] = null;
                });

                // 下落
                await dropTiles();
                
                // 填充新方块
                const newTiles = fillEmptyTiles();
                render([], newTiles);
                await sleep(300);

                // 检查新的匹配
                matches = findMatches();
            }

            // 更新最高分
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('bestMatch3', bestScore);
                document.getElementById('best').textContent = bestScore;
            }
        }

        async function dropTiles() {
            let dropped;
            do {
                dropped = false;
                for (let c = 0; c < GRID_SIZE; c++) {
                    for (let r = GRID_SIZE - 1; r > 0; r--) {
                        if (grid[r][c] === null && grid[r - 1][c] !== null) {
                            grid[r][c] = grid[r - 1][c];
                            grid[r - 1][c] = null;
                            dropped = true;
                        }
                    }
                }
                if (dropped) {
                    render();
                    await sleep(50);
                }
            } while (dropped);
        }

        function fillEmptyTiles() {
            const newTiles = [];
            for (let c = 0; c < GRID_SIZE; c++) {
                for (let r = 0; r < GRID_SIZE; r++) {
                    if (grid[r][c] === null) {
                        grid[r][c] = Math.floor(Math.random() * GEM_TYPES.length);
                        newTiles.push({ r, c });
                    }
                }
            }
            return newTiles;
        }

        function showCombo(comboNum) {
            const container = document.getElementById('comboContainer');
            container.innerHTML = `<div class="combo-text">${comboNum}连击！</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 800);
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;
                
                if (timeLeft <= 10) {
                    document.getElementById('timer').classList.add('warning');
                }
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameOver = true;
            if (timerInterval) clearInterval(timerInterval);
            
            document.getElementById('messageTitle').textContent = '时间到！';
            document.getElementById('messageScore').textContent = `得分: ${score}`;
            document.getElementById('gameMessage').classList.add('show');
        }

        function restartGame() {
            if (timerInterval) clearInterval(timerInterval);
            init();
        }

        // 触摸支持
        let touchStartRow, touchStartCol;
        
        document.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const tile = document.elementFromPoint(touch.clientX, touch.clientY);
            if (tile && tile.classList.contains('tile')) {
                touchStartRow = parseInt(tile.dataset.row);
                touchStartCol = parseInt(tile.dataset.col);
            }
        });

        document.addEventListener('touchend', (e) => {
            if (touchStartRow === undefined || touchStartCol === undefined) return;
            
            const touch = e.changedTouches[0];
            const tile = document.elementFromPoint(touch.clientX, touch.clientY);
            if (tile && tile.classList.contains('tile')) {
                const endRow = parseInt(tile.dataset.row);
                const endCol = parseInt(tile.dataset.col);
                
                const dr = Math.abs(touchStartRow - endRow);
                const dc = Math.abs(touchStartCol - endCol);
                
                if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
                    handleTileClick(touchStartRow, touchStartCol);
                    handleTileClick(endRow, endCol);
                }
            }
            
            touchStartRow = undefined;
            touchStartCol = undefined;
        });

        init();
    </script>
</body>
</html>
