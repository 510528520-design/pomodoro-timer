<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>贪吃蛇 Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a1a;
            padding: 20px;
            touch-action: none;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 40px;
            font-weight: bold;
            color: #4ade80;
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
        }

        .scores-container {
            display: flex;
            gap: 10px;
        }

        .score-box {
            background: rgba(74, 222, 128, 0.1);
            padding: 8px 15px;
            border-radius: 10px;
            text-align: center;
            min-width: 80px;
            border: 1px solid rgba(74, 222, 128, 0.3);
        }

        .score-label {
            font-size: 11px;
            text-transform: uppercase;
            color: rgba(74, 222, 128, 0.7);
            font-weight: bold;
        }

        .score-value {
            font-size: 24px;
            font-weight: bold;
            color: #4ade80;
        }

        .above-game {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .game-intro {
            color: rgba(74, 222, 128, 0.7);
            font-size: 14px;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .game-btn {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.3);
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .game-btn:hover {
            background: rgba(74, 222, 128, 0.2);
            transform: translateY(-2px);
        }

        .game-btn:active {
            transform: translateY(0);
        }

        .game-container {
            position: relative;
            background: #000;
            border-radius: 15px;
            padding: 10px;
            border: 2px solid rgba(74, 222, 128, 0.3);
        }

        .canvas-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameCanvas {
            border-radius: 10px;
            background: #000;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
        }

        .d-pad-btn {
            background: rgba(74, 222, 128, 0.1);
            border: 2px solid rgba(74, 222, 128, 0.3);
            border-radius: 10px;
            color: #4ade80;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.1s ease;
            user-select: none;
            -webkit-user-select: none;
        }

        .d-pad-btn:hover, .d-pad-btn:active {
            background: rgba(74, 222, 128, 0.3);
        }

        .d-pad-empty {
            background: transparent;
            border: none;
        }

        .game-message {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            animation: fadeIn 0.3s ease;
        }

        .game-message.show {
            display: flex;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .message-content {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 40px rgba(74, 222, 128, 0.2);
            border: 2px solid rgba(74, 222, 128, 0.5);
        }

        .message-title {
            font-size: 40px;
            font-weight: bold;
            color: #ef4444;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }

        .message-score {
            font-size: 24px;
            color: #4ade80;
            margin-bottom: 20px;
        }

        .message-btn {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
            border: 2px solid rgba(74, 222, 128, 0.5);
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .message-btn:hover {
            background: rgba(74, 222, 128, 0.2);
            transform: translateY(-2px);
        }

        .how-to-play {
            margin-top: 20px;
            color: rgba(74, 222, 128, 0.7);
            font-size: 13px;
            line-height: 1.6;
            text-align: center;
        }

        .how-to-play strong {
            color: #4ade80;
        }

        .pause-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            font-weight: bold;
            color: #fbbf24;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
            display: none;
            z-index: 50;
            pointer-events: none;
        }

        .pause-indicator.show {
            display: block;
        }

        @media (max-width: 500px) {
            .title {
                font-size: 28px;
            }

            .game-container {
                padding: 8px;
            }

            .message-title {
                font-size: 28px;
            }

            .d-pad {
                grid-template-columns: repeat(3, 55px);
                grid-template-rows: repeat(3, 55px);
            }
        }

        @media (min-width: 768px) {
            .controls {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">🐍 贪吃蛇</div>
            <div class="scores-container">
                <div class="score-box">
                    <div class="score-label">分数</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">最高分</div>
                    <div class="score-value" id="best">0</div>
                </div>
            </div>
        </div>

        <div class="above-game">
            <div class="game-intro">
                方向键或滑动控制蛇移动！
            </div>
            <div class="button-group">
                <button class="game-btn" id="pauseBtn" onclick="togglePause()">暂停</button>
                <button class="game-btn" onclick="restartGame()">重新开始</button>
            </div>
        </div>

        <div class="game-container">
            <div class="canvas-container">
                <canvas id="gameCanvas"></canvas>
            </div>
            <div class="pause-indicator" id="pauseIndicator">⏸️ 已暂停</div>
        </div>

        <div class="controls">
            <div class="d-pad">
                <div class="d-pad-btn d-pad-empty"></div>
                <button class="d-pad-btn" id="btnUp">▲</button>
                <div class="d-pad-btn d-pad-empty"></div>
                <button class="d-pad-btn" id="btnLeft">◀</button>
                <div class="d-pad-btn d-pad-empty"></div>
                <button class="d-pad-btn" id="btnRight">▶</button>
                <div class="d-pad-btn d-pad-empty"></div>
                <button class="d-pad-btn" id="btnDown">▼</button>
                <div class="d-pad-btn d-pad-empty"></div>
            </div>
        </div>

        <div class="how-to-play">
            <strong>游戏说明：</strong>用方向键或滑动控制蛇移动，吃到红色食物得分，撞墙或撞到自己游戏结束！
        </div>
    </div>

    <div class="game-message" id="gameMessage">
        <div class="message-content">
            <div class="message-title" id="messageTitle">游戏结束！</div>
            <div class="message-score" id="messageScore">得分: 0</div>
            <button class="message-btn" onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <script>
        const GRID_SIZE = 20;
        const CELL_SIZE = 20;
        const INITIAL_SPEED = 150;
        const MIN_SPEED = 50;
        const SPEED_INCREASE = 2;

        let canvas, ctx;
        let snake = [];
        let food = null;
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let bestScore = localStorage.getItem('bestSnake') || 0;
        let gameOver = false;
        let isPaused = false;
        let gameLoop = null;
        let speed = INITIAL_SPEED;
        let canvasSize;

        function init() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');

            const maxCanvasSize = Math.min(window.innerWidth - 60, 460);
            canvasSize = Math.floor(maxCanvasSize / GRID_SIZE) * GRID_SIZE;
            canvas.width = canvasSize;
            canvas.height = canvasSize;

            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameOver = false;
            isPaused = false;
            speed = INITIAL_SPEED;

            document.getElementById('score').textContent = score;
            document.getElementById('best').textContent = bestScore;
            document.getElementById('gameMessage').classList.remove('show');
            document.getElementById('pauseIndicator').classList.remove('show');
            document.getElementById('pauseBtn').textContent = '暂停';

            generateFood();
            render();
            startGameLoop();
        }

        function generateFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function render() {
            const cellSize = canvasSize / GRID_SIZE;
            
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvasSize, canvasSize);

            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * cellSize, 0);
                ctx.lineTo(i * cellSize, canvasSize);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * cellSize);
                ctx.lineTo(canvasSize, i * cellSize);
                ctx.stroke();
            }

            if (food) {
                ctx.fillStyle = '#ef4444';
                ctx.shadowColor = '#ef4444';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(
                    food.x * cellSize + cellSize / 2,
                    food.y * cellSize + cellSize / 2,
                    cellSize / 2 - 3,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            snake.forEach((segment, index) => {
                if (index === 0) {
                    ctx.fillStyle = '#22c55e';
                    ctx.shadowColor = '#22c55e';
                    ctx.shadowBlur = 8;
                } else {
                    const alpha = 1 - (index / snake.length) * 0.5;
                    ctx.fillStyle = `rgba(34, 197, 94, ${alpha})`;
                    ctx.shadowBlur = 0;
                }

                const padding = 2;
                const x = segment.x * cellSize + padding;
                const y = segment.y * cellSize + padding;
                const size = cellSize - padding * 2;

                ctx.beginPath();
                ctx.roundRect(x, y, size, size, 5);
                ctx.fill();
            });
            ctx.shadowBlur = 0;
        }

        function update() {
            if (gameOver || isPaused) return;

            direction = { ...nextDirection };

            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                endGame();
                return;
            }

            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                
                if (speed > MIN_SPEED) {
                    speed -= SPEED_INCREASE;
                    clearInterval(gameLoop);
                    startGameLoop();
                }

                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('bestSnake', bestScore);
                    document.getElementById('best').textContent = bestScore;
                }

                generateFood();
            } else {
                snake.pop();
            }

            render();
        }

        function startGameLoop() {
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, speed);
        }

        function endGame() {
            gameOver = true;
            if (gameLoop) clearInterval(gameLoop);
            
            document.getElementById('messageTitle').textContent = '游戏结束！';
            document.getElementById('messageScore').textContent = `得分: ${score}`;
            document.getElementById('gameMessage').classList.add('show');
        }

        function togglePause() {
            if (gameOver) return;
            
            isPaused = !isPaused;
            document.getElementById('pauseBtn').textContent = isPaused ? '继续' : '暂停';
            document.getElementById('pauseIndicator').classList.toggle('show', isPaused);
        }

        function restartGame() {
            if (gameLoop) clearInterval(gameLoop);
            init();
        }

        function changeDirection(newDir) {
            if (newDir.x !== -direction.x || newDir.y !== -direction.y) {
                nextDirection = newDir;
            }
        }

        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    changeDirection({ x: 0, y: -1 });
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    changeDirection({ x: 0, y: 1 });
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    changeDirection({ x: -1, y: 0 });
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    changeDirection({ x: 1, y: 0 });
                    break;
                case ' ':
                    e.preventDefault();
                    togglePause();
                    break;
            }
        });

        document.getElementById('btnUp').addEventListener('click', () => changeDirection({ x: 0, y: -1 }));
        document.getElementById('btnDown').addEventListener('click', () => changeDirection({ x: 0, y: 1 }));
        document.getElementById('btnLeft').addEventListener('click', () => changeDirection({ x: -1, y: 0 }));
        document.getElementById('btnRight').addEventListener('click', () => changeDirection({ x: 1, y: 0 }));

        let touchStartX, touchStartY;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
            if (!touchStartX || !touchStartY) return;

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            const minSwipe = 30;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > minSwipe) {
                    if (dx > 0) {
                        changeDirection({ x: 1, y: 0 });
                    } else {
                        changeDirection({ x: -1, y: 0 });
                    }
                }
            } else {
                if (Math.abs(dy) > minSwipe) {
                    if (dy > 0) {
                        changeDirection({ x: 0, y: 1 });
                    } else {
                        changeDirection({ x: 0, y: -1 });
                    }
                }
            }

            touchStartX = undefined;
            touchStartY = undefined;
        }, { passive: true });

        window.addEventListener('resize', () => {
            if (!gameOver) {
                const maxCanvasSize = Math.min(window.innerWidth - 60, 460);
                canvasSize = Math.floor(maxCanvasSize / GRID_SIZE) * GRID_SIZE;
                canvas.width = canvasSize;
                canvas.height = canvasSize;
                render();
            }
        });

        init();
    </script>
</body>
</html>
