<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048 Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #faf8ef;
            padding: 20px;
            touch-action: none;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 60px;
            font-weight: bold;
            color: #776e65;
        }

        .scores-container {
            display: flex;
            gap: 10px;
        }

        .score-box {
            background: #bbada0;
            padding: 8px 15px;
            border-radius: 6px;
            text-align: center;
            min-width: 80px;
        }

        .score-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #eee4da;
            font-weight: bold;
        }

        .score-value {
            font-size: 20px;
            font-weight: bold;
            color: white;
        }

        .above-game {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .game-intro {
            color: #776e65;
            font-size: 14px;
        }

        .restart-btn {
            background: #8f7a66;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .restart-btn:hover {
            background: #9f8b77;
        }

        .game-container {
            position: relative;
            background: #bbada0;
            border-radius: 10px;
            padding: 15px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .grid-cell {
            aspect-ratio: 1;
            background: rgba(238, 228, 218, 0.35);
            border-radius: 6px;
        }

        .tile-container {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
        }

        .tile {
            position: absolute;
            width: calc(25% - 11.25px);
            aspect-ratio: 1;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            transition: all 0.15s ease;
            z-index: 10;
        }

        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.317); }
        .tile-256 { background: #edcc61; color: #f9f6f2; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.317); }
        .tile-512 { background: #edc850; color: #f9f6f2; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.317); }
        .tile-1024 { background: #edc53f; color: #f9f6f2; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.317); }
        .tile-2048 { background: #edc22e; color: #f9f6f2; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.317); }
        .tile-super { background: #3c3a32; color: #f9f6f2; }

        .tile-new {
            animation: appear 0.2s ease;
        }

        .tile-merged {
            animation: pop 0.2s ease;
        }

        @keyframes appear {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .game-message {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(238, 228, 218, 0.73);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            animation: fadeIn 0.5s ease;
        }

        .game-message.show {
            display: flex;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .message-content {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .message-title {
            font-size: 40px;
            font-weight: bold;
            color: #776e65;
            margin-bottom: 20px;
        }

        .message-win .message-title {
            color: #f2b179;
        }

        .message-btn {
            background: #8f7a66;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .message-btn:hover {
            background: #9f8b77;
        }

        .tile-text {
            font-size: 32px;
        }

        .tile-128 .tile-text,
        .tile-256 .tile-text,
        .tile-512 .tile-text {
            font-size: 28px;
        }

        .tile-1024 .tile-text,
        .tile-2048 .tile-text {
            font-size: 24px;
        }

        .tile-super .tile-text {
            font-size: 20px;
        }

        @media (max-width: 500px) {
            .title {
                font-size: 40px;
            }

            .game-container {
                padding: 10px;
            }

            .grid-container {
                gap: 10px;
            }

            .tile-container {
                top: 10px;
                left: 10px;
                right: 10px;
                bottom: 10px;
            }

            .tile {
                width: calc(25% - 7.5px);
            }

            .tile-text {
                font-size: 24px;
            }

            .tile-128 .tile-text,
            .tile-256 .tile-text,
            .tile-512 .tile-text {
                font-size: 20px;
            }

            .tile-1024 .tile-text,
            .tile-2048 .tile-text {
                font-size: 18px;
            }

            .tile-super .tile-text {
                font-size: 16px;
            }
        }

        .how-to-play {
            margin-top: 20px;
            color: #776e65;
            font-size: 13px;
            line-height: 1.5;
        }

        .how-to-play strong {
            color: #8f7a66;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">2048</div>
            <div class="scores-container">
                <div class="score-box">
                    <div class="score-label">Score</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">Best</div>
                    <div class="score-value" id="best">0</div>
                </div>
            </div>
        </div>

        <div class="above-game">
            <div class="game-intro">
                Join the tiles, get to <strong>2048!</strong>
            </div>
            <button class="restart-btn" onclick="restartGame()">New Game</button>
        </div>

        <div class="game-container">
            <div class="grid-container">
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
            </div>
            <div class="tile-container" id="tileContainer"></div>
        </div>

        <div class="how-to-play">
            <strong>How to play:</strong> Use your <strong>arrow keys</strong> or <strong>swipe</strong> to move the tiles. When two tiles with the same number touch, they merge into one!
        </div>
    </div>

    <div class="game-message" id="gameMessage">
        <div class="message-content">
            <div class="message-title" id="messageTitle">Game Over!</div>
            <button class="message-btn" onclick="restartGame()">Try Again</button>
        </div>
    </div>

    <script>
        let grid = [];
        let score = 0;
        let bestScore = localStorage.getItem('best2048') || 0;
        let gameOver = false;
        let won = false;

        function init() {
            grid = Array(4).fill(null).map(() => Array(4).fill(0));
            score = 0;
            gameOver = false;
            won = false;
            document.getElementById('best').textContent = bestScore;
            document.getElementById('score').textContent = score;
            document.getElementById('gameMessage').classList.remove('show', 'message-win');
            addRandomTile();
            addRandomTile();
            render();
        }

        function addRandomTile() {
            const emptyCells = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 0) {
                        emptyCells.push({ r, c });
                    }
                }
            }
            if (emptyCells.length > 0) {
                const { r, c } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                grid[r][c] = Math.random() < 0.9 ? 2 : 4;
                return { r, c, isNew: true };
            }
            return null;
        }

        function render(newTile = null, mergedTiles = []) {
            const container = document.getElementById('tileContainer');
            container.innerHTML = '';

            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] !== 0) {
                        const tile = document.createElement('div');
                        const value = grid[r][c];
                        tile.className = `tile tile-${value > 2048 ? 'super' : value}`;
                        if (newTile && newTile.r === r && newTile.c === c) {
                            tile.classList.add('tile-new');
                        }
                        if (mergedTiles.some(t => t.r === r && t.c === c)) {
                            tile.classList.add('tile-merged');
                        }
                        const gap = window.innerWidth <= 500 ? 10 : 15;
                        const cellSize = (100 - gap * 3) / 4;
                        const x = c * (cellSize + gap);
                        const y = r * (cellSize + gap);
                        tile.style.left = `${x}%`;
                        tile.style.top = `${y}%`;
                        tile.innerHTML = `<div class="tile-text">${value}</div>`;
                        container.appendChild(tile);
                    }
                }
            }
        }

        function canMove() {
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 0) return true;
                    if (c < 3 && grid[r][c] === grid[r][c + 1]) return true;
                    if (r < 3 && grid[r][c] === grid[r + 1][c]) return true;
                }
            }
            return false;
        }

        function slideAndMerge(row) {
            let arr = row.filter(val => val !== 0);
            let scoreAdd = 0;
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i + 1]) {
                    arr[i] *= 2;
                    scoreAdd += arr[i];
                    if (arr[i] === 2048) won = true;
                    arr.splice(i + 1, 1);
                }
            }
            while (arr.length < 4) arr.push(0);
            return { row: arr, score: scoreAdd };
        }

        function moveLeft() {
            let moved = false;
            let totalScore = 0;
            let merged = [];
            for (let r = 0; r < 4; r++) {
                const original = [...grid[r]];
                const result = slideAndMerge(grid[r]);
                grid[r] = result.row;
                totalScore += result.score;
                if (original.join(',') !== grid[r].join(',')) {
                    moved = true;
                }
            }
            score += totalScore;
            return { moved, merged };
        }

        function moveRight() {
            let moved = false;
            let totalScore = 0;
            let merged = [];
            for (let r = 0; r < 4; r++) {
                const original = [...grid[r]];
                const result = slideAndMerge(grid[r].reverse());
                grid[r] = result.row.reverse();
                totalScore += result.score;
                if (original.join(',') !== grid[r].join(',')) {
                    moved = true;
                }
            }
            score += totalScore;
            return { moved, merged };
        }

        function moveUp() {
            let moved = false;
            let totalScore = 0;
            let merged = [];
            for (let c = 0; c < 4; c++) {
                let col = [grid[0][c], grid[1][c], grid[2][c], grid[3][c]];
                const original = [...col];
                const result = slideAndMerge(col);
                col = result.row;
                totalScore += result.score;
                for (let r = 0; r < 4; r++) {
                    grid[r][c] = col[r];
                }
                if (original.join(',') !== [grid[0][c], grid[1][c], grid[2][c], grid[3][c]].join(',')) {
                    moved = true;
                }
            }
            score += totalScore;
            return { moved, merged };
        }

        function moveDown() {
            let moved = false;
            let totalScore = 0;
            let merged = [];
            for (let c = 0; c < 4; c++) {
                let col = [grid[0][c], grid[1][c], grid[2][c], grid[3][c]].reverse();
                const original = [...col];
                const result = slideAndMerge(col);
                col = result.row.reverse();
                totalScore += result.score;
                for (let r = 0; r < 4; r++) {
                    grid[r][c] = col[r];
                }
                if (original.join(',') !== [grid[0][c], grid[1][c], grid[2][c], grid[3][c]].join(',')) {
                    moved = true;
                }
            }
            score += totalScore;
            return { moved, merged };
        }

        function handleMove(direction) {
            if (gameOver) return;
            let result;
            switch (direction) {
                case 'left': result = moveLeft(); break;
                case 'right': result = moveRight(); break;
                case 'up': result = moveUp(); break;
                case 'down': result = moveDown(); break;
            }
            if (result.moved) {
                const newTile = addRandomTile();
                document.getElementById('score').textContent = score;
                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('best2048', bestScore);
                    document.getElementById('best').textContent = bestScore;
                }
                render(newTile, result.merged);
                if (won && !document.getElementById('gameMessage').classList.contains('message-win')) {
                    setTimeout(() => {
                        document.getElementById('gameMessage').classList.add('show', 'message-win');
                        document.getElementById('messageTitle').textContent = 'You Win!';
                    }, 300);
                } else if (!canMove()) {
                    gameOver = true;
                    setTimeout(() => {
                        document.getElementById('gameMessage').classList.add('show');
                        document.getElementById('messageTitle').textContent = 'Game Over!';
                    }, 300);
                }
            }
        }

        function restartGame() {
            init();
        }

        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowLeft': e.preventDefault(); handleMove('left'); break;
                case 'ArrowRight': e.preventDefault(); handleMove('right'); break;
                case 'ArrowUp': e.preventDefault(); handleMove('up'); break;
                case 'ArrowDown': e.preventDefault(); handleMove('down'); break;
            }
        });

        let startX, startY;
        document.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            if (!startX || !startY) return;
            const endX = e.changedTouches[0].clientX;
            const endY = e.changedTouches[0].clientY;
            const diffX = endX - startX;
            const diffY = endY - startY;
            const minSwipe = 50;
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > minSwipe) {
                    handleMove(diffX > 0 ? 'right' : 'left');
                }
            } else {
                if (Math.abs(diffY) > minSwipe) {
                    handleMove(diffY > 0 ? 'down' : 'up');
                }
            }
            startX = null;
            startY = null;
        });

        init();
    </script>
</body>
</html>
